<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Анна — редактор, журналист, контент-специалист</title>
  <meta name="description" content="Портфолио редактора и контент-специалиста: коммерческие тексты, соцсети, редактура и AI-инструменты." />

  <!-- Шрифт Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- =================================================================
       НАВИГАЦИЯ
  ================================================================== -->
  <header class="navbar" id="navbar">
    <div class="container">
      <span class="nav-logo" id="nav-logo">Анна</span>

      <nav class="nav-links" id="nav-links">
        <a href="#works">Работы</a>
        <a href="#cases">Кейсы</a>
        <a href="#tools">Инструменты</a>
        <a href="#contacts">Контакты</a>
      </nav>

      <button class="nav-toggle" id="nav-toggle" aria-label="Открыть меню">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- =================================================================
       ПЕРВЫЙ ЭКРАН (HERO)
  ================================================================== -->
  <section class="hero" id="hero">
    <div class="container">
      <div class="hero-content">
        <p class="eyebrow">Портфолио</p>
        <h1 class="hero-name" id="hero-name">Анна</h1>
        <p class="hero-roles" id="hero-roles"></p>
        <p class="hero-description" id="hero-description"></p>

        <div class="hero-actions">
          <!-- Ссылка на резюме подставляется из data.js (profile.resumeLink) -->
          <a class="btn btn-primary" id="resume-btn" href="#" target="_blank" rel="noopener">
            Скачать резюме
          </a>
        </div>

        <div class="hero-contacts" id="hero-contacts" aria-label="Контакты"></div>
      </div>

      <div class="hero-photo-wrap">
        <div class="hero-photo-glow"></div>
        <div class="hero-photo">
          <!-- ФОТО: путь берётся из data.js (profile.photo). Чтобы поменять
               фотографию, замените файл или путь там — здесь ничего менять не нужно -->
          <img id="hero-photo-img" src="" alt="Фото" />
        </div>
      </div>
    </div>
  </section>

  <!-- =================================================================
       ИЗБРАННЫЕ РАБОТЫ
  ================================================================== -->
  <section id="works">
    <div class="container">
      <div class="section-head reveal">
        <p class="eyebrow">Портфолио</p>
        <h2 class="section-title">Избранные работы</h2>
        <p class="section-subtitle">Несколько проектов, которыми я особенно горжусь.</p>
      </div>

      <div class="featured-grid" id="featured-grid"></div>
    </div>
  </section>

  <!-- =================================================================
       КЕЙСЫ ПО КАТЕГОРИЯМ
  ================================================================== -->
  <section id="cases">
    <div class="container">
      <div class="section-head reveal">
        <p class="eyebrow">Работы по направлениям</p>
        <h2 class="section-title">Кейсы</h2>
        <p class="section-subtitle">Выберите категорию, чтобы посмотреть примеры работ внутри неё.</p>
      </div>

      <div class="categories-grid" id="categories-grid"></div>
    </div>
  </section>

  <!-- =================================================================
       ОБО МНЕ
  ================================================================== -->
  

  <!-- =================================================================
       СТЕК ИНСТРУМЕНТОВ
  ================================================================== -->
  <section id="tools">
    <div class="container">
      <div class="section-head reveal">
        <p class="eyebrow">С чем работаю</p>
        <h2 class="section-title">Стек инструментов</h2>
      </div>

      <div class="tools-grid" id="tools-grid"></div>
    </div>
  </section>

  <!-- =================================================================
       ФУТЕР
  ================================================================== -->
  <footer class="footer" id="contacts">
    <div class="container">
      <div>
        <div class="footer-name" id="footer-name">Анна</div>
        <div class="footer-contacts" id="footer-contacts"></div>
      </div>

      <div style="display:flex; align-items:center; gap:20px;">
        <span style="font-size:13px; color: var(--color-text-tertiary);">
          © <span id="footer-year"></span>
        </span>
        <button class="back-to-top" id="back-to-top" aria-label="Наверх">↑</button>
      </div>
    </div>
  </footer>

  <!-- =================================================================
       МОДАЛЬНОЕ ОКНО КЕЙСОВ (заполняется через JS)
  ================================================================== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-window">
      <button class="modal-close" id="modal-close" aria-label="Закрыть">✕</button>

      <div class="modal-header">
        <span class="modal-icon" id="modal-icon"></span>
        <h3 class="modal-title" id="modal-title"></h3>
      </div>
      <p class="modal-description" id="modal-description"></p>
      <div class="modal-tags" id="modal-tags"></div>

      <div class="modal-works" id="modal-works"></div>
    </div>
  </div>

  <!-- =================================================================
       СКРИПТЫ
       Порядок важен: сначала данные (data.js), затем логика (script.js)
  ================================================================== -->
  <script src="js/data.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
